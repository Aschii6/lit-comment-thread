<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title><comment-thread> Demo</title>
    <script src="../node_modules/@webcomponents/webcomponentsjs/webcomponents-loader.js"></script>
    <script src="../node_modules/lit/polyfill-support.js"></script>
    <script type="module" src="../comment-thread.js"></script>
    <style></style>
  </head>
  <body>
    <div style="margin: 0 20px">
      <h1>Lit Element Blog</h1>
      <p>Lit, alongside HTML, CSS, and JavaScript are were they once did.</p>
      <p>They became the first ever to have the first as in the era of that when of a computer science and web began.</p>
      <p>Congratulations!</p>

      <h3>Do you agree or is this too controversial? Discuss below.</h3>
      <comment-thread id="thread"></comment-thread>
    </div>

    <script>
      let comments = [
        {
          id: '1',
          username: 'Alice',
          content: 'This is a comment.',
          date: new Date('2024-06-12T10:00:00'),
          replies: [
            {
              id: '2',
              username: 'Bob',
              content: 'This is a reply.',
              date: new Date('2024-06-12T10:05:00'),
              replies: [
                {
                  id: '4',
                  username: 'Dave',
                  content:
                    'This is a nested reply. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.',
                  date: new Date('2024-06-13T12:10:00'),
                  replies: [
                    {
                      id: '6',
                      username: 'Frank',
                      content: 'This is a nested reply to the nested reply.',
                      date: new Date('2024-07-01T09:00:00'),
                      replies: [],
                    },
                  ],
                },
              ],
            },
            {
              id: '5',
              username: 'Eve',
              content: 'This is another reply.',
              date: new Date('2024-07-21T14:30:00'),
              replies: [],
            },
          ],
        },
        {
          id: '3',
          username: 'Charlie',
          content: 'This is another comment.',
          date: new Date('2025-05-03T11:00:00'),
          replies: [],
        },
      ];
      let commentsLength = 6;

      const currentUsername = 'Alice';

      const thread = document.getElementById('thread');
      thread.comments = comments;

      thread.addEventListener('submit-comment', (event) => {
        const {content, parentId} = event.detail;
        const newComment = {
          id: (++commentsLength).toString(),
          username: currentUsername,
          content,
          date: new Date(),
          replies: [],
        };

        console.log(parentId, newComment);

        dispatchEvent(
          new CustomEvent('add-comment', {
            detail: {
              comment: newComment,
              parentId,
            },
          })
        );
      });
    </script>
  </body>
</html>
